name: GITHUB action CICD
on:
  workflow_dispatch:
jobs:
  buid:
    runs-on: ubuntu-latest
    steps:
      - name: git checkout
        uses: actions/checkout@v7
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: buid project with maven
        run: mvn clean install
