name: GITHUB action CICD
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: git checkout
        uses: actions/checkout@v7
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: buid project with maven
        run: mvn clean install

      - uses: actions/upload-artifact@v4
        with:
          name: myporject.jar
          path: target/*.jar
      
  scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Sonar Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn -B verify \
            org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=GitHubAction \
            -Dsonar.projectName=GitHubAction \
            -Dsonar.qualitygate.wait=true

      - name: Install trivy
        run: |
            sudo apt-get install wget apt-transport-https gnupg lsb-release -y
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
            echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
            sudo apt-get update
            sudo apt-get install trivy -y
      - name: Trivy FS scan
        run: |
            mkdir -p reports
            trivy fs . --severity HIGH,CRITICAL --exit-code 0 --format sarif -o reports/trivy-fs.sarif

  Docker-Build-Tag-Push:
    runs-on: ubuntu-latest
    needs: scan
    
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: myporject.jar
          path: target

      - run: ls -l target
      
      - name: Build Docker Image
        run: docker build -t githubactionimg .
            
