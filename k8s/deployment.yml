apiVersion: apps/v1
kind: Deployment
metadata:
  name: mydeploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops
  template:
    metadata:
      labels:
        app: devops
    spec:
      containers:
      - name: myfirstcontainer
        image: vsawantvinay/
        ports:
        - port: 80
          containerPort: 9090
---

apiVersion: v1
kind: Service
metadata:
  name: mysvc
spec:
  selector:
    app: devops
  type: NodePort
  ports:
  - port: 80
    targetPort: 9090
