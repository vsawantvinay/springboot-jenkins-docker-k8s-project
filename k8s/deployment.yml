apiVersion: apps/v1
kind: Deployment
metadata:
  name: mydeploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops
  template:
    metadata:
      labels:
        app: devops
    spec:
      containers:
      - name: myfirstcontainer
        image: vsawantvinay/my-devsecops-img:fc65663
        ports:
        - containerPort: 9090
---

apiVersion: v1
kind: Service
metadata:
  name: mysvc
spec:
  selector:
    app: devops
  type: NodePort
  ports:
  - port: 80
    targetPort: 9090
    nodePort: 30412
